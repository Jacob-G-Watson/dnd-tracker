name: Deploy Backend to Apps Script

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Authenticate clasp
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Push to Apps Script
        working-directory: backend
        run: npx clasp push --force

      - name: Deploy Web App
        working-directory: backend
        id: deploy
        run: |
          DEPLOY_OUTPUT=$(npx clasp deploy -i "${{ vars.DEPLOYMENT_ID }}" -d "Auto deploy $(date -u +%Y-%m-%dT%H:%M:%SZ)")
          echo "$DEPLOY_OUTPUT"
          echo "url=https://script.google.com/macros/s/${{ vars.DEPLOYMENT_ID }}/exec" >> "$GITHUB_OUTPUT"

      - name: Update GitHub variables
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh variable set API_URL --body "${{ steps.deploy.outputs.url }}" --repo ${{ github.repository }}

      - name: Trigger frontend deploy
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh workflow run deploy.yml --repo ${{ github.repository }}
